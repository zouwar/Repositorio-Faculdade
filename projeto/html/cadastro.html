<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <script src="../js/cad.js" defer></script>
    <script src="../js/darkmode.js"></script>
    <link rel="stylesheet" href="../css/estilocad.css">
    <link rel="stylesheet" href="../css/estilocomp.css">
    <link rel="stylesheet" href="../css/estiloslide.css">
    <title>Cadastro</title>
</head>
<body>
    <header>
        <nav>
            <a href="../index.html">Home</a>
            <a href="#">Sobre</a>
            <a href="#">Serviços</a>
            <a href="#">Contato</a>
            <a href="#">Blog</a>
            <a href="html/cadastro.html">Cadastro</a>

            <!-- botão dark -->
        <button id="toggleDark">🌙</button>
        </nav>
    </header>
    <div class="container">
    <h2>Cadastro</h2>
    <form id="cpfForm">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required>

        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" name="cpf" required placeholder="000.000.000-00">

        <label for="celular">Celular:</label>
        <input type="text" id="celular" name="celular" required placeholder="(xx) xxxxx-xxxx">


        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required placeholder="@gmail.com">


        <label for="cep">Cep:</label>
        <input type="text" id="cep" name="cep" required placeholder="00000-000">


        <label for="cidade">Cidade:</label>
        <input type="text" id="cidade" name="cidade" required>


        <label for="estado">Estado:</label>
        <input type="text" id="estado" name="estado" required>


        <label for="endereco">Endereço:</label>
        <input type="text" id="endereco" name="endereco" required>

        
        <label for="numero">Numero:</label>
        <input type="number" id="num" name="numero" required>


        <label for="complemento">Complemento:</label>
        <input type="text" id="complemento" name="complemento" required>


        <label for="bairro">Bairro:</label>
        <input type="text" id="bairro" name="bairro" required>

        

        <button type="submit">Cadastrar</button>
    </form>
</div>
</body>
</html>
